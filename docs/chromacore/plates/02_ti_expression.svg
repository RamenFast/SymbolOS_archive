<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ti2-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="16%" stop-color="#ff8800"/>
      <stop offset="33%" stop-color="#ffff00"/>
      <stop offset="50%" stop-color="#00ff00"/>
      <stop offset="66%" stop-color="#0088ff"/>
      <stop offset="83%" stop-color="#0000ff"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </linearGradient>
    <linearGradient id="ti2-bot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8800ff"/>
      <stop offset="16%" stop-color="#0000ff"/>
      <stop offset="33%" stop-color="#0088ff"/>
      <stop offset="50%" stop-color="#00ff00"/>
      <stop offset="66%" stop-color="#ffff00"/>
      <stop offset="83%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff0000"/>
