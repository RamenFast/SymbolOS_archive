<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="psy-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0088"/>
      <stop offset="14%" stop-color="#ff0000"/>
      <stop offset="28%" stop-color="#ff8800"/>
      <stop offset="42%" stop-color="#ffff00"/>
      <stop offset="57%" stop-color="#00ff44"/>
      <stop offset="71%" stop-color="#0088ff"/>
      <stop offset="85%" stop-color="#8800ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="psy-bot" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff0088"/>
      <stop offset="14%" stop-color="#ff0000"/>
      <stop offset="28%" stop-color="#ff8800"/>
      <stop offset="42%" stop-color="#ffff00"/>
      <stop offset="57%" stop-color="#00ff44"/>
      <stop offset="71%" stop-color="#0088ff"/>
      <stop offset="85%" stop-color="#8800ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="#080810"/>
  <!-- Psychedelic top bands -->
  <rect x="0" y="0" width="640" height="12" fill="url(#psy-top)"/>
  <rect x="0" y="12" width="640" height="8" fill="url(#psy-top)" opacity=".6"/>
  <rect x="0" y="20" width="640" height="5" fill="url(#psy-top)" opacity=".3"/>
  <rect x="0" y="25" width="640" height="3" fill="url(#psy-top)" opacity=".15"/>
  <!-- Header -->
  <text x="40" y="56" fill="#00e5ff" font-family="Courier New,monospace" font-size="8">TYPE: PSYCHEDELIC PASS ── Plate 05:28</text>
  <text x="40" y="76" fill="#e8e8f0" font-family="Courier New,monospace" font-size="11" font-weight="700">MEME MAP — The Canonical Vibe Layer</text>
  <!-- Content -->
  <text x="40" y="110" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">Psychedelic mode reserves consistent chromatic bands at</text>
  <text x="40" y="124" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">document edges. The center content prioritizes readability</text>
  <text x="40" y="138" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">while the edges maintain psy97 intensity.</text>
  <!-- Meme guys -->
  <text x="40" y="168" fill="#00e5ff" font-family="Courier New,monospace" font-size="9" font-weight="700">CANONICAL MEMES:</text>
  <text x="40" y="188" fill="#fada5e" font-family="Courier New,monospace" font-size="9">🐢 The Turtle    — "this is fine"</text>
  <text x="40" y="204" fill="#c0c0c0" font-family="Courier New,monospace" font-size="9">💀 The Skeleton  — "show me proof, not potential"</text>
  <text x="40" y="220" fill="#228b22" font-family="Courier New,monospace" font-size="9">🦊 The Fox       — "the map is not the territory"</text>
  <text x="40" y="236" fill="#ff69b4" font-family="Courier New,monospace" font-size="9">🌸 The Bloom     — "the heart loves unconditionally"</text>
  <text x="40" y="252" fill="#87ceeb" font-family="Courier New,monospace" font-size="9">☂️ The Umbrella  — "everything is kind beneath"</text>
  <text x="40" y="268" fill="#ff8c00" font-family="Courier New,monospace" font-size="9">⚡ The Spark     — "if it ain't fun, it ain't engineered"</text>
  <text x="40" y="284" fill="#ffd700" font-family="Courier New,monospace" font-size="9">🪞 The Mirror    — "what rhymes with alignment?"</text>
  <!-- Rule -->
  <text x="40" y="318" fill="#556677" font-family="Courier New,monospace" font-size="8">Main rule of Psy97: chaos at edges, clarity at centre.</text>
  <text x="40" y="332" fill="#556677" font-family="Courier New,monospace" font-size="8">"if it ain't fun, it ain't sustainable" — Rule 5</text>
  <text x="40" y="346" fill="#556677" font-family="Courier New,monospace" font-size="8">"vibes are load-bearing" — Rule 7</text>
  <!-- Psy bottom bands -->
  <rect x="0" y="452" width="640" height="3" fill="url(#psy-bot)" opacity=".15"/>
  <rect x="0" y="455" width="640" height="5" fill="url(#psy-bot)" opacity=".3"/>
  <rect x="0" y="460" width="640" height="8" fill="url(#psy-bot)" opacity=".6"/>
  <rect x="0" y="468" width="640" height="12" fill="url(#psy-bot)"/>
  <!-- Footer text -->
  <text x="320" y="440" text-anchor="middle" fill="#556677" font-family="Courier New,monospace" font-size="8">Chromacore '97 · Plate 05 · Psy97 Scroll · vibes v1.0</text>
</svg>
