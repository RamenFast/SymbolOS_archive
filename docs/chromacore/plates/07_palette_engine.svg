  </defs>
  <rect width="640" height="480" fill="#080810"/>
  <!-- Header -->
  <text x="40" y="24" fill="#00e5ff" font-family="Courier New,monospace" font-size="8" opacity=".5">── PALETTE ENGINE SPECIFICATION ── Plate 07:38</text>
  <text x="40" y="44" fill="#e8e8f0" font-family="Courier New,monospace" font-size="11" font-weight="700">1905 THOUGHTFORMS — Color Language</text>
  <!-- API notation -->
  <text x="40" y="72" fill="#00e5ff" font-family="Courier New,monospace" font-size="8">getPalette(ti, fi, character, mode) → colorSuite</text>
  <!-- Color swatch table -->
  <text x="40" y="100" fill="#556677" font-family="Courier New,monospace" font-size="8" font-weight="700">IDX  RING  NAME              HEX      MEANING</text>
  <line x1="40" y1="104" x2="540" y2="104" stroke="#556677" stroke-width=".5" opacity=".3"/>
  <rect x="40" y="110" width="12" height="12" rx="2" fill="#fada5e"/>
  <text x="60" y="120" fill="#fada5e" font-family="Courier New,monospace" font-size="8"> 0  R0  Primrose yellow   #FADA5E  highest intellect</text>
  <rect x="40" y="126" width="12" height="12" rx="2" fill="#228b22"/>
  <text x="60" y="136" fill="#228b22" font-family="Courier New,monospace" font-size="8"> 1  R1  Pure green        #228B22  adaptability</text>
  <rect x="40" y="142" width="12" height="12" rx="2" fill="#e49b0f"/>
  <text x="60" y="152" fill="#e49b0f" font-family="Courier New,monospace" font-size="8"> 2  R2  Clear gamboge     #E49B0F  higher intellect</text>
  <rect x="40" y="158" width="12" height="12" rx="2" fill="#ff8c00"/>
  <text x="60" y="168" fill="#ff8c00" font-family="Courier New,monospace" font-size="8"> 3  R3  Deep orange       #FF8C00  ambition, drive</text>
  <rect x="40" y="174" width="12" height="12" rx="2" fill="#8b00ff"/>
  <text x="60" y="184" fill="#8b00ff" font-family="Courier New,monospace" font-size="8"> 4  R4  Violet            #8B00FF  Fi+Ti bridge</text>
  <rect x="40" y="190" width="12" height="12" rx="2" fill="#ff2400"/>
  <text x="60" y="200" fill="#ff2400" font-family="Courier New,monospace" font-size="8"> 5  R5  Brilliant scarlet #FF2400  righteous boundary</text>
  <rect x="40" y="206" width="12" height="12" rx="2" fill="#0000cd"/>
  <text x="60" y="216" fill="#0000cd" font-family="Courier New,monospace" font-size="8"> 6  R6  Rich deep blue    #0000CD  heartfelt devotion</text>
  <rect x="40" y="222" width="12" height="12" rx="2" fill="#ffd700"/>
  <text x="60" y="232" fill="#ffd700" font-family="Courier New,monospace" font-size="8"> 7  R7  Golden stars      #FFD700  persistence</text>
  <!-- Extended colors -->
  <text x="40" y="258" fill="#556677" font-family="Courier New,monospace" font-size="8" font-weight="700">EXTENDED PALETTE</text>
  <line x1="40" y1="262" x2="300" y2="262" stroke="#556677" stroke-width=".5" opacity=".3"/>
  <rect x="40" y="268" width="12" height="12" rx="2" fill="#ffb7c5"/>
  <text x="60" y="278" fill="#ffb7c5" font-family="Courier New,monospace" font-size="8"> —  ——  Agape rose        #FFB7C5  unselfish love</text>
  <rect x="40" y="284" width="12" height="12" rx="2" fill="#87ceeb"/>
  <text x="60" y="294" fill="#87ceeb" font-family="Courier New,monospace" font-size="8"> —  ——  Azure umbrella    #87CEEB  umbrella devotion</text>
