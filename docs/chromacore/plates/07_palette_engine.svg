  <rect x="40" y="336" width="560" height="14" rx="7" fill="url(#pal-bar)"/>
  <!-- Shadow note -->
  <text x="40" y="372" fill="#556677" font-family="Courier New,monospace" font-size="8">Shadow anti-patterns exist (black, brick-red, dark-red)</text>
  <text x="40" y="386" fill="#556677" font-family="Courier New,monospace" font-size="8">but are never rendered as text colors — structural only.</text>
  <text x="40" y="406" fill="#556677" font-family="Courier New,monospace" font-size="8">Source: "Thought-Forms" (Besant + Leadbeater, 1905)</text>
  <text x="40" y="420" fill="#556677" font-family="Courier New,monospace" font-size="8">Canonical ref: docs/thoughtforms_colors.md</text>
  <!-- Footer -->
  <text x="40" y="458" fill="#556677" font-family="Courier New,monospace" font-size="8">Chromacore '97 · Plate 07 · Palette Engine · STATUS v1.3</text>
