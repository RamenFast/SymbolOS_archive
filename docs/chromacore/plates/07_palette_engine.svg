      <stop offset="0%" stop-color="#ff2400"/>
      <stop offset="12.5%" stop-color="#ff8c00"/>
      <stop offset="25%" stop-color="#fada5e"/>
      <stop offset="37.5%" stop-color="#228b22"/>
      <stop offset="50%" stop-color="#87ceeb"/>
      <stop offset="62.5%" stop-color="#0000cd"/>
      <stop offset="75%" stop-color="#8b00ff"/>
      <stop offset="87.5%" stop-color="#ffb7c5"/>
