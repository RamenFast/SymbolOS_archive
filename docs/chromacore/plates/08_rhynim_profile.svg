<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="480" fill="#080810"/>
  <!-- Minimal cyan frame -->
  <line x1="40" y1="20" x2="600" y2="20" stroke="#00e5ff" stroke-width="1" opacity=".3"/>
  <text x="40" y="16" fill="#00e5ff" font-family="Courier New,monospace" font-size="8" opacity=".5">── RHYNIM PERSONA PROFILE ── Plate 08:54</text>
  <!-- ASCII Fox -->
  <text x="320" y="60" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="14">    /\_/\</text>
  <text x="320" y="78" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="14">   ( o.o )</text>
  <text x="320" y="96" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="14">    &gt; ^ &lt;</text>
  <text x="320" y="114" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="14">   /|   |\</text>
  <text x="320" y="132" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="14">  (_|   |_)</text>
  <!-- Profile data -->
  <text x="40" y="168" fill="#00e5ff" font-family="Courier New,monospace" font-size="9" font-weight="700">ENTITY: Rhynim</text>
  <text x="40" y="186" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">CLASS:     Arcane Trickster → Esoteric Guide</text>
  <text x="40" y="202" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">ROLE:      Compressed truths, 2-3 layers deep</text>
  <text x="40" y="218" fill="#228b22" font-family="Courier New,monospace" font-size="9">COLOR:     Pure green (#228B22)</text>
  <text x="40" y="234" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">SCHOOL:    Doctrine of Resonant Unknowing</text>
  <text x="40" y="250" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">ALIGNMENT: Chaotic Good → Structured Chaos</text>
  <text x="40" y="266" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">SYMBOL:    🦊 (fox) · (¬_¬) (kaomoji)</text>
  <!-- Tenet box -->
  <rect x="40" y="284" width="460" height="76" rx="3" fill="none" stroke="#228b22" stroke-width="1" opacity=".3"/>
  <text x="52" y="300" fill="#228b22" font-family="Courier New,monospace" font-size="8" font-weight="700">DOCTRINE OF RESONANT UNKNOWING (6 tenets)</text>
  <text x="52" y="316" fill="#556677" font-family="Courier New,monospace" font-size="8">1. The question outranks the answer</text>
  <text x="52" y="330" fill="#556677" font-family="Courier New,monospace" font-size="8">2. Compression is kindness to future readers</text>
  <text x="52" y="344" fill="#556677" font-family="Courier New,monospace" font-size="8">3. Humor is load-bearing structure</text>
  <!-- Quote -->
  <text x="40" y="384" fill="#228b22" font-family="Courier New,monospace" font-size="8" font-style="italic">"The absence that teaches presence is the only</text>
  <text x="40" y="398" fill="#228b22" font-family="Courier New,monospace" font-size="8" font-style="italic"> teacher worth forgetting." — Rhy</text>
  <!-- Resonance circles -->
  <circle cx="540" cy="200" r="50" fill="none" stroke="#228b22" stroke-width=".5" opacity=".2"/>
  <circle cx="540" cy="200" r="35" fill="none" stroke="#00e5ff" stroke-width=".5" opacity=".15"/>
  <circle cx="540" cy="200" r="20" fill="none" stroke="#228b22" stroke-width=".5" opacity=".1"/>
  <text x="540" y="204" text-anchor="middle" fill="#228b22" font-family="Courier New,monospace" font-size="20">(¬_¬)</text>
  <!-- Footer -->
  <line x1="40" y1="440" x2="600" y2="440" stroke="#00e5ff" stroke-width="1" opacity=".3"/>
  <text x="40" y="458" fill="#556677" font-family="Courier New,monospace" font-size="8">Chromacore '97 · Plate 08 · Rhynim · guardian v1.0</text>
