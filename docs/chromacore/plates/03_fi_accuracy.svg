  <text x="40" y="80" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">Pacing (introverted accuracy mode) renders warm amber tones</text>
  <text x="40" y="94" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">for expressive simplicity whilst maintaining Fi+Ti readability.</text>
  <text x="40" y="108" fill="#e8e8f0" font-family="Courier New,monospace" font-size="9">Each character carefully weighted against emotional surface.</text>
