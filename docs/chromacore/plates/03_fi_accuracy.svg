  <text x="40" y="158" fill="#228b22" font-family="Courier New,monospace" font-size="9">PUBLIC   docs/      schemas, README, index   🟢</text>
  <text x="40" y="172" fill="#ffd700" font-family="Courier New,monospace" font-size="9">PARTY    prompts/   agent configs, gov       🟡</text>
  <text x="40" y="186" fill="#ff2400" font-family="Courier New,monospace" font-size="9">PRIVATE  internal/  memory, session logs     🔴</text>
