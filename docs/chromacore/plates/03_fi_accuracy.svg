  <text x="52" y="226" fill="#ffaa55" font-family="Courier New,monospace" font-size="9" font-weight="700">☂️ Umbrella Principle</text>
  <text x="52" y="242" fill="#e8e8f0" font-family="Courier New,monospace" font-size="8">Default-private. Kindness as structural constraint.</text>
  <text x="52" y="256" fill="#e8e8f0" font-family="Courier New,monospace" font-size="8">Never disclose without consent. Err toward safety.</text>
  <text x="52" y="262" fill="#e8e8f0" font-family="Courier New,monospace" font-size="8"></text>
