  <text x="40" y="316" fill="#c0c0c0" font-family="Courier New,monospace" font-size="8">💀 The Skeleton — "show me proof, not potential"</text>
  <text x="40" y="330" fill="#fada5e" font-family="Courier New,monospace" font-size="8">🐢 The Turtle   — "this is fine" (patience mantra)</text>
  <text x="40" y="344" fill="#87ceeb" font-family="Courier New,monospace" font-size="8">☂️ The Umbrella — "everything is kind beneath"</text>
